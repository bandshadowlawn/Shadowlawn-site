<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadowlawn - Links</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0ede8;
      --muted: #888;
      --accent: #c8a96e;
      --accent-dim: rgba(200, 169, 110, 0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 80px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Header */
    .header {
      text-align: center;
      padding-bottom: 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .tagline {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }

    .link-item:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-text {
      flex: 1;
    }

    .link-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .link-value {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
    }

    .link-arrow {
      color: var(--muted);
      flex-shrink: 0;
      font-size: 18px;
      transition: color 0.2s, transform 0.2s;
    }

    .link-item:hover .link-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* Icon backgrounds */
    .icon-email   { background: rgba(100, 160, 220, 0.12); }
    .icon-spotify { background: rgba(30, 215, 96, 0.12); }
    .icon-instagram { background: rgba(225, 90, 130, 0.12); }
    .icon-venmo   { background: rgba(0, 130, 215, 0.12); }

    /* Footer */
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: #444;
      text-transform: uppercase;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="avatar">YN</div>
    <div class="name">Shadowlawn</div>
    <div class="tagline">Musician &amp; Creator</div>
  </div>

  <div class="links">

    <!-- Email -->
    <a class="link-item" href="mailto:bandshadowlawn@gmail.com">
      <div class="link-icon icon-email">
        <svg viewBox="0 0 24 24" fill="none" stroke="#64a0dc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">Email</div>
        <div class="link-value">bandshadowlawn@gmail.com</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

    <!-- Spotify -->
    <a class="link-item" href="https://open.spotify.com/artist/YOUR_ARTIST_ID" target="_blank" rel="noopener">
      <div class="link-icon icon-spotify">
        <svg viewBox="0 0 24 24" fill="#1ed760">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 01-.277-1.215c3.809-.87 7.077-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.781.781 0 01.52-.973c3.632-1.102 8.147-.568 11.233 1.329a.78.78 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.794c3.527-1.072 9.39-.865 13.092 1.325a.938.938 0 01-.932 1.626z"/>
        </svg>
      </div>
      <div class="COMING SOON">
        <div class="link-label">Spotify</div>
        <div class="link-value">Listen on Spotify</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

    <!-- Instagram -->
    <a class="link-item" href="https://instagram.com/shadowlawnband" target="_blank" rel="noopener">
      <div class="link-icon icon-instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e15a82" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="#e15a82" stroke="none"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">Instagram</div>
        <div class="link-value">@shadowlawnband</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

    <!-- Venmo -->
    <a class="link-item" href="https://venmo.com/shadowlawn" target="_blank" rel="noopener">
      <div class="link-icon icon-venmo">
        <svg viewBox="0 0 24 24" fill="#0082d7">
          <path d="M19.1 2c.4 1.4.6 2.9.6 4.4 0 4.6-3.9 10.6-7.1 14.8H5.7L3 3.4l5.8-.5 1.4 10.9c1.3-2.2 2.9-5.7 2.9-8.1 0-1.3-.2-2.2-.6-2.9L19.1 2z"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">Venmo</div>
        <div class="link-value">@shadowlawn</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

  </div>

  <div class="footer">shadowlawn.com</div>

</div>
</body>
</html>
